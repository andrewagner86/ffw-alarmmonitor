<!DOCTYPE html>
<html lang="de">
<head>
  <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
  <meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Feuerwehr — Einsatzübersicht</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --red: #E8180B; --bg: #0A0A0B; --surface: #111214; --surface2: #18191D;
    --border: #2A2B30; --text: #F0F0F2; --muted: #7A7C85;
    --green: #22C55E; --yellow: #EAB308;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Barlow', sans-serif; min-height: 100vh; }
  body::before { content: ''; position: fixed; inset: 0; background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(255,255,255,0.015) 2px, rgba(255,255,255,0.015) 4px); pointer-events: none; z-index: 999; }

  header { display: flex; align-items: center; justify-content: space-between; padding: 0 2rem; height: 64px; background: var(--surface); border-bottom: 2px solid var(--red); position: sticky; top: 0; z-index: 100; }
  .logo { display: flex; align-items: center; gap: 12px; font-family: 'Barlow Condensed', sans-serif; font-weight: 900; font-size: 1.4rem; letter-spacing: 0.08em; text-transform: uppercase; }
  .logo-icon { width: 36px; height: 36px; background: var(--red); border-radius: 4px; display: grid; place-items: center; font-size: 1.1rem; }
  .hdr-right { display: flex; align-items: center; gap: 1rem; }
  .refresh-indicator { font-size: 0.75rem; color: var(--muted); display: flex; align-items: center; gap: 6px; }
  .refresh-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--green); animation: blink 1s infinite; }
  @keyframes blink { 0%,100%{opacity:1;} 50%{opacity:0.2;} }
  .hdr-btn { display: inline-flex; align-items: center; gap: 6px; font-size: 0.8rem; font-weight: 600; letter-spacing: 0.05em; text-transform: uppercase; color: var(--muted); padding: 5px 10px; border: 1px solid var(--border); border-radius: 6px; background: transparent; transition: all 0.2s; text-decoration: none; }
  .hdr-btn:hover { color: var(--text); border-color: #555; }

  .page { padding: 2rem; }

  .no-alarm { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 50vh; text-align: center; gap: 1rem; color: var(--muted); }
  .no-alarm-icon { font-size: 4rem; opacity: 0.3; }
  .no-alarm h2 { font-family: 'Barlow Condensed', sans-serif; font-size: 1.5rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; }

  #alarm-info { margin-bottom: 2rem; }
  .alarm-badge { display: inline-flex; align-items: center; gap: 8px; background: var(--red); color: white; font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 0.8rem; letter-spacing: 0.12em; text-transform: uppercase; padding: 5px 12px; border-radius: 3px; margin-bottom: 0.75rem; animation: pulse-badge 2s infinite; }
  @keyframes pulse-badge { 0%,100%{opacity:1;} 50%{opacity:0.75;} }
  .alarm-title { font-family: 'Barlow Condensed', sans-serif; font-size: 3rem; font-weight: 900; letter-spacing: 0.04em; text-transform: uppercase; line-height: 1; margin-bottom: 0.3rem; }
  .alarm-meta { color: var(--muted); font-size: 0.85rem; }

  .gruppe-section { margin-bottom: 1.25rem; width: 100%; box-sizing: border-box; }
  .gruppe-header { display: flex; align-items: flex-start; gap: 10px; margin-bottom: 0.75rem; padding-bottom: 0.5rem; border-bottom: 1px solid var(--border); }
  .gruppe-label { font-family: 'Barlow Condensed', sans-serif; font-size: 1rem; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: #FCD34D; }
  .gruppe-count { font-size: 0.75rem; color: var(--muted); background: var(--surface2); border: 1px solid var(--border); border-radius: 99px; padding: 2px 8px; }

  .fahrzeug-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 0.65rem; align-items: stretch; }

  .fahrzeug-card { background: var(--surface2); border-radius: 10px; padding: 1rem 1.1rem; position: relative; overflow: hidden; border: 2px solid; min-height: 7.5rem; display: flex; flex-direction: column; }
  .fahrzeug-card::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 4px; }

  .status-alarmiert { border-color: var(--green); }
  .status-alarmiert::before { background: var(--green); }
  .status-bereitschaft { border-color: var(--yellow); }
  .status-bereitschaft::before { background: var(--yellow); }

  .fahrzeug-name { font-family: 'Barlow Condensed', sans-serif; font-size: 1.3rem; font-weight: 700; margin-bottom: 0.15rem; }
  .fahrzeug-meta { font-size: 0.78rem; color: var(--muted); margin-bottom: 0.4rem; }
  .fahrzeug-funkkennung { font-size: 0.75rem; color: #93C5FD; font-weight: 600; margin-bottom: 0.4rem; }
  .status-badge { display: inline-flex; align-items: center; gap: 5px; font-size: 0.68rem; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; padding: 2px 7px; border-radius: 3px; margin-top: auto; align-self: flex-start; }
  .sl-alarmiert { color: var(--green); background: rgba(34,197,94,0.12); border: 1px solid rgba(34,197,94,0.3); }
  .sl-bereitschaft { color: var(--yellow); background: rgba(234,179,8,0.12); border: 1px solid rgba(234,179,8,0.3); }

  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
</head>
<body>
<header>
  <div class="logo">
    <div class="logo-icon">🔥</div>
    Feuerwehr&nbsp;<span style="color:var(--red)">Einsatz</span>
  </div>
  <div class="hdr-right">
    <div class="refresh-indicator">
      <span class="refresh-dot"></span> Live
    </div>

  </div>
</header>

<div class="page">
  <div id="content">
    <div class="no-alarm">
      <div class="no-alarm-icon">🚒</div>
      <h2>Kein aktiver Alarm</h2>
      <p>Sobald ein Alarm ausgelöst wird, erscheinen die Fahrzeuge hier.</p>
    </div>
  </div>
</div>

<script>
const STATUS_LABEL = { alarmiert: 'Alarmiert', bereitschaft: 'Bereitschaft' };

function renderWarnungen(warnungen) {
  if (!warnungen || warnungen.length === 0) return '';
  return '<div style="margin-top:0.75rem;display:flex;flex-direction:column;gap:0.35rem">' +
    warnungen.map(w =>
      '<div style="display:flex;align-items:flex-start;gap:0.5rem;background:rgba(234,179,8,0.08);border:1px solid rgba(234,179,8,0.3);border-radius:6px;padding:0.45rem 0.65rem;font-size:0.8rem">' +
      '<span>⚠️</span>' +
      '<div><strong style="display:block;color:#FCD34D;font-size:0.82rem">' + w.fahrzeug + '</strong>' +
      '<span style="color:#9CA3AF">' + w.grund + '</span></div></div>'
    ).join('') + '</div>';
}

function render(data) {
  const el = document.getElementById('content');
  if (!data.alarm) {
    el.innerHTML = `
      <div class="no-alarm">
        <div class="no-alarm-icon">🚒</div>
        <h2>Kein aktiver Alarm</h2>
        <p>Sobald ein Alarm ausgelöst wird, erscheinen die Fahrzeuge hier.</p>
      </div>`;
    return;
  }

  const { alarm, gruppen, gesamt, warnungen } = data;
  let html = `
    <div id="alarm-info">
      <div class="alarm-badge"><span style="width:6px;height:6px;border-radius:50%;background:white;display:inline-block;margin-right:4px"></span>Alarm aktiv</div>
      <div class="alarm-title">${alarm.alarmierungstyp || 'Alarm'}</div>
      ${alarm.beschreibung ? `<div class="alarm-meta">${alarm.beschreibung}</div>` : ''}
      ${(alarm.stichwort || alarm.territorium) ? `<div style="display:flex;gap:0.5rem;flex-wrap:wrap;margin-top:0.5rem">
        ${alarm.stichwort ? `<span style="padding:0.2rem 0.65rem;border-radius:4px;background:rgba(139,92,246,0.12);border:1px solid rgba(139,92,246,0.35);color:#C4B5FD;font-size:0.8rem;font-weight:700">${alarm.stichwort}</span>` : ''}
        ${alarm.territorium ? `<span style="padding:0.2rem 0.65rem;border-radius:4px;background:rgba(59,130,246,0.12);border:1px solid rgba(59,130,246,0.35);color:#93C5FD;font-size:0.8rem;font-weight:700">${alarm.territorium}</span>` : ''}
      </div>` : ''}
      <div class="alarm-meta" style="margin-top:4px">Alarmiert: ${alarm.erstellt_am || ''} · ${gesamt} Fahrzeug${gesamt !== 1 ? 'e' : ''}</div>
      ${renderWarnungen(warnungen)}
    </div>`;

  const unterteilungen  = data.einsatz_unterteilungen || 1;
  const darstellung     = data.einsatz_darstellung    || 'vertikal';

  function renderGruppe(gruppe) {
    const label = gruppe.gruppe || 'Ohne Gruppe';
    const labelColor = gruppe.gruppe ? '#FCD34D' : 'var(--muted)';
    let h = `
      <div class="gruppe-section">
        <div class="gruppe-header">
          <span class="gruppe-label" style="color:${labelColor}">📂 ${label}</span>
          <span class="gruppe-count">${gruppe.fahrzeuge.length}</span>
        </div>
        <div class="fahrzeug-grid">`;
    for (const f of gruppe.fahrzeuge) {
      h += `
          <div class="fahrzeug-card status-${f.status}">
            <div class="fahrzeug-name">${f.name}</div>
            ${f.kennzeichen ? `<div class="fahrzeug-meta">${f.kennzeichen}</div>` : ''}
            ${f.funkkennung ? `<div class="fahrzeug-funkkennung">📻 ${f.funkkennung}</div>` : ''}
            <span class="status-badge sl-${f.status}">${STATUS_LABEL[f.status] || f.status}</span>
          </div>`;
    }
    h += `</div></div>`;
    return h;
  }

  if (darstellung === 'vertikal') {
    // Unterteilungen = Anzahl Spalten; Gruppen spaltenweise verteilt
    const cols = Array.from({length: unterteilungen}, () => []);
    gruppen.forEach((g, i) => cols[i % unterteilungen].push(g));
    const maxRows = Math.max(...cols.map(c => c.length));
    // grid-template-rows: repeat(maxRows, auto 1fr):
    // Jede visuelle Zeile besteht aus einer Header-Zeile (auto) und einer Inhalts-Zeile (1fr).
    // Alle Header in derselben visuellen Zeile teilen damit automatisch dieselbe Höhe.
    const gtRows = Array.from({length: maxRows}, () => 'auto 1fr').join(' ');
    html += `<div style="display:grid;grid-template-columns:repeat(${unterteilungen},1fr);grid-template-rows:${gtRows};align-items:stretch;column-gap:1.5rem;row-gap:0;">`;
    cols.forEach((col, colIdx) => {
      col.forEach((g, rowIdx) => {
        const label = g.gruppe || 'Ohne Gruppe';
        const labelColor = g.gruppe ? '#FCD34D' : 'var(--muted)';
        const headerRow  = rowIdx * 2 + 1;
        const contentRow = rowIdx * 2 + 2;
        html += `<div class="gruppe-header" style="grid-column:${colIdx+1};grid-row:${headerRow};margin-bottom:0.75rem;padding-bottom:0.5rem;border-bottom:1px solid var(--border);">
          <span class="gruppe-label" style="color:${labelColor}">📂 ${label}</span>
          <span class="gruppe-count">${g.fahrzeuge.length}</span>
        </div>
        <div class="fahrzeug-grid" style="grid-column:${colIdx+1};grid-row:${contentRow};align-self:start;margin-bottom:1.5rem;">`;
        for (const f of g.fahrzeuge) {
          html += `<div class="fahrzeug-card status-${f.status}">
            <div class="fahrzeug-name">${f.name}</div>
            ${f.kennzeichen ? `<div class="fahrzeug-meta">${f.kennzeichen}</div>` : ''}
            ${f.funkkennung ? `<div class="fahrzeug-funkkennung">📻 ${f.funkkennung}</div>` : ''}
            <span class="status-badge sl-${f.status}">${STATUS_LABEL[f.status] || f.status}</span>
          </div>`;
        }
        html += `</div>`;
      });
    });
    html += `</div>`;
  } else {
    // Horizontal: Gruppen nebeneinander; Unterteilungen = Anzahl Zeilen übereinander
    const rows = Array.from({length: unterteilungen}, () => []);
    gruppen.forEach((g, i) => rows[i % unterteilungen].push(g));
    // Maximale Spaltenanzahl ermitteln damit alle Zeilen gleich breit sind
    const maxCols = Math.max(...rows.map(r => r.length));
    html += `<div style="display:flex;flex-direction:column;gap:1.5rem;">`;
    for (const row of rows) {
      // Alle Zeilen nutzen dieselbe Spaltenanzahl (maxCols) → gleiche Breite pro Gruppe
      // grid-template-rows: auto 1fr → Header und Fahrzeug-Grid in eigenen Zeilen
      html += `<div style="display:grid;grid-template-columns:repeat(${maxCols},1fr);grid-template-rows:auto 1fr;align-items:stretch;gap:0 1.5rem;">`;
      row.forEach((g, colIdx) => {
        const label = g.gruppe || 'Ohne Gruppe';
        const labelColor = g.gruppe ? '#FCD34D' : 'var(--muted)';
        // Header in Zeile 1, Fahrzeug-Grid in Zeile 2 – gleiche Spalte
        html += `<div class="gruppe-header" style="grid-column:${colIdx+1};grid-row:1;margin-bottom:0.75rem;padding-bottom:0.5rem;border-bottom:1px solid var(--border);">
          <span class="gruppe-label" style="color:${labelColor}">📂 ${label}</span>
          <span class="gruppe-count">${g.fahrzeuge.length}</span>
        </div>
        <div class="fahrzeug-grid" style="grid-column:${colIdx+1};grid-row:2;align-self:start;">`;
        for (const f of g.fahrzeuge) {
          html += `<div class="fahrzeug-card status-${f.status}">
            <div class="fahrzeug-name">${f.name}</div>
            ${f.kennzeichen ? `<div class="fahrzeug-meta">${f.kennzeichen}</div>` : ''}
            ${f.funkkennung ? `<div class="fahrzeug-funkkennung">📻 ${f.funkkennung}</div>` : ''}
            <span class="status-badge sl-${f.status}">${STATUS_LABEL[f.status] || f.status}</span>
          </div>`;
        }
        html += `</div>`;
      });
      html += `</div>`;
    }
    html += `</div>`;
  }

  el.innerHTML = html;
}

async function refresh() {
  try {
    const res = await fetch('/api/einsatz');
    render(await res.json());
  } catch(e) { console.error('Refresh-Fehler:', e); }
}

// Server-Sent Events: Push-Updates vom Server
function connectSSE() {
  const es = new EventSource('/api/einsatz/stream');
  es.addEventListener('alarm',  () => refresh());
  es.addEventListener('status', () => refresh());
  es.onerror = () => {
    es.close();
    setTimeout(connectSSE, 3000);
  };
}

refresh();    // initialer Datenabruf beim Seitenaufruf
connectSSE(); // SSE-Verbindung aufbauen
</script>
</body>
</html>
